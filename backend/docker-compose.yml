version: '3.8'

services:
  # 1. YOUR NESTJS BACKEND
  api:
    build: .
    container_name: researchflow-api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:mysecretpassword@postgres:5432/researchflow?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis
      - qdrant
    restart: unless-stopped

  # 2. YOUR POSTGRES DATABASE
  postgres:
    image: postgres:15
    container_name: researchflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: researchflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # 3. YOUR EXISTING QDRANT
  qdrant:
    image: qdrant/qdrant:latest
    container_name: researchflow-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 4. YOUR EXISTING REDIS
  redis:
    image: redis:alpine
    container_name: researchflow-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
