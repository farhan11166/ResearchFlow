version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: researchflow-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: researchflow-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  qdrant_data:
