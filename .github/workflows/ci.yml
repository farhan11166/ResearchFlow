name: Backend CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"] 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js      
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
    - name: Generate Prisma Client
      run: npx prisma generate    

    - name: Install Dependencies
      run: npm ci   

    - name: Run Linter
      run: npm run lint

    - name: Build Project
      run: npm run build

    - name: Run Unit Tests
      run: npm run test