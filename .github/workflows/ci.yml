name: Backend CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"] 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js      
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    # The canvas module requires OS-level C++ libraries to compile on GitHub servers!
    - name: Install OS Dependencies
      run: sudo apt-get update -y && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
    - name: Install Dependencies
      run: npm ci   

    - name: Generate Prisma Client
      run: npx prisma generate    

    - name: Run Linter
      run: npm run lint

    - name: Build Project
      run: npm run build